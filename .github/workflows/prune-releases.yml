name: Prune old releases

on:
  release:
    types: [published]

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const KEEP = 3;
            const TAG_PREFIX = "Callstack-v";

            const all = await github.paginate(
              github.rest.repos.listReleases,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 },
            );

            const candidates = all
              .filter(r => !r.draft)
              .filter(r => r.tag_name.startsWith(TAG_PREFIX))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = candidates.slice(KEEP);
            core.info(`Total non-draft ${TAG_PREFIX}* releases: ${candidates.length}`);
            core.info(`Keeping: ${candidates.slice(0, KEEP).map(r => r.tag_name).join(", ") || "(none)"}`);
            core.info(`Deleting: ${toDelete.map(r => r.tag_name).join(", ") || "(none)"}`);

            for (const r of toDelete) {
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: r.id,
                });
                core.info(`Deleted release ${r.tag_name} (id ${r.id})`);
              } catch (e) {
                core.warning(`Failed to delete ${r.tag_name}: ${e.message}`);
              }
            }
